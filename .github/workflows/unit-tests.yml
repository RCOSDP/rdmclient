name: Unit Tests

on:
  push:
    branches-ignore:
      - '[0-9]*'

env:
  COVERAGE: true

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
        matrix:
          python: ['3.8', '3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: pip install -r devRequirements.txt
      - name: Run Test
        run: |
          python --version
          if [ ${COVERAGE} == "true" ];
          then py.test --cov=osfclient; else
          py.test;
          fi
      - name: Coverage
        with:
          job-status: ${{ job.status }}
        run: |
          if [ ${COVERAGE} == "true" ]; then
          pip install codecov;
          codecov;
          fi

